version: "1.0"
last_updated: "2026-04-30"

# This file is the SCHEMA EXAMPLE. The two profiles below are placeholder
# templates a fresh operator can copy and overwrite. AgentFlow framework code
# is brand-neutral: real brand / voice / sources / keywords belong to the
# operator and live at ~/.agentflow/topic_profiles.yaml (NOT here).
#
# To bootstrap your own profile from the harness:
#   af topic-profile init -i --profile <your-id>           # interactive
#   af topic-profile init --profile <your-id> --from-file <path>  # from yaml
#
# Or in the openclaw skill distribution: copy
# .claude/skills/agentflow/assets/topic_profile.yaml, fill it in, and pass
# via --from-file.

profiles:
  # ---------------------------------------------------------------------------
  # Generic placeholder. Replace `your-brand` with a slug that matches your
  # publisher_account. KEEP nothing here verbatim; the field shapes are what
  # the schema demands, not the values.
  # ---------------------------------------------------------------------------
  your-brand:
    label: "Your Brand"
    summary: "One-paragraph elevator pitch describing what you publish about."
    intent: "围绕你的核心赛道展开（产品、技术、人物、市场观察等任选）。"
    keyword_groups:
      core:
        - "core-keyword-1"
        - "core-keyword-2"
        - "core-keyword-3"
      product:
        - "your-product-feature-1"
        - "your-product-feature-2"
      ecosystem:
        - "competitor-or-peer-1"
        - "category-tag-1"
        - "category-tag-2"
    hotspot_terms:
      - "core-keyword-1"
      - "core-keyword-2"
      - "your-product-feature-1"
      - "competitor-or-peer-1"
    search_queries:
      - "core-keyword-1"
      - "your-product-feature-1"
    default_search_query: "core-keyword-1"
    avoid_terms:
      - "off-topic-noise-1"
      - "off-topic-noise-2"
    publisher_account:
      brand: "Your Brand"
      output_language: "zh-Hans"
      image_prompt_hints:
        - "describe the visual identity you want for cover images"
        - "color palette, style register, what to avoid"

  # ---------------------------------------------------------------------------
  # Second example — kept as a vertical-specific schema demo (AI infra). Edit
  # or remove freely. Demonstrates a sparser profile where keyword_groups has
  # only two buckets and several optional fields are omitted.
  # ---------------------------------------------------------------------------
  ai_infra:
    label: "AI Infra"
    summary: "Foundational infra for training, inference, agent runtime, and observability."
    intent: "围绕 AI 基础设施的供给侧约束、工程架构、成本结构和运维工具展开。"
    keyword_groups:
      core:
        - "AI infrastructure"
        - "GPU infrastructure"
        - "inference"
        - "training infra"
        - "observability"
      infra:
        - "vector database"
        - "agent runtime"
        - "context engineering"
        - "evaluation"
        - "latency"
        - "cost per token"
    hotspot_terms:
      - "AI infrastructure"
      - "GPU infrastructure"
      - "inference"
      - "training infra"
      - "agent runtime"
      - "observability"
      - "evaluation"
      - "latency"
      - "cost per token"
    search_queries:
      - "AI infrastructure"
      - "GPU infrastructure"
      - "agent runtime"
    default_search_query: "AI infrastructure"
