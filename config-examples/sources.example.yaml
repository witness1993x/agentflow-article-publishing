  - url: "https://stratechery.com/feed/"
    name: "Stratechery"
    relevance_to_series: ["C"]

  - url: "https://www.notboring.co/feed"
    name: "Not Boring"
    relevance_to_series: ["B", "C"]

  - url: "https://matt.blwt.io/feed/feed.rss"
    name: "Matt Blewitt (Blockworks)"
    relevance_to_series: ["C"]

  # AI / general tech
  - url: "https://simonwillison.net/atom/everything/"
    name: "Simon Willison"
    relevance_to_series: ["B"]

  - url: "https://www.anthropic.com/rss.xml"
    name: "Anthropic Blog"
    relevance_to_series: ["B"]

  # Web3 research
  - url: "https://decentralisedco.com/feed"
    name: "Decentralised.co"
