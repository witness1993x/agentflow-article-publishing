  - url: "https://messari.io/rss"
    name: "Messari Research"
    relevance_to_series: ["C"]

# ============================================================
# HackerNews
# ============================================================
# Default keywords are deliberately broad so this example matches
# anything. Real installs SHOULD narrow these to their vertical —
# `AI` / `Claude` / `LLM` match half of the HN front page on any
# given day, drowning out narrower signals like `MEV` / `rollup` /
# `indexer` for a crypto-infra publisher. The chainstream overlay
# replaces these wholesale.
hackernews:
  enabled: true
  filter_keywords:
    - "AI"
    - "Agent"
    - "Claude"
    - "LLM"
    - "Web3"
    - "Crypto"
    - "Product Management"
    - "Developer Tools"
  relevance_to_series: ["B"]
  min_score: 50

# ============================================================
# Substack competitors (same domain, other authors)
# ============================================================
substack_competitors:
  - url: "https://decentralisedco.com/"
    name: "Decentralised.co"
    relevance_to_series: ["C"]

  - url: "https://banklesshq.com/"
    name: "Bankless"
    relevance_to_series: ["C"]

  - url: "https://oneusefulthing.org/"
    name: "One Useful Thing (Ethan Mollick)"
    relevance_to_series: ["B"]

# ============================================================
# Newsletter via IMAP (v0.5+)
# ============================================================
newsletters:
  enabled: false
  imap_config:
    host: "imap.gmail.com"
    port: 993
    email_env: "NEWSLETTER_EMAIL"
    password_env: "NEWSLETTER_APP_PASSWORD"
  sources:
    - name: "The Rundown AI"
      sender_pattern: "*rundown*"
      relevance_to_series: ["B"]

# ============================================================
# Discovery params
# ============================================================
discovery_config:
  scan_frequency_hours: 6            # how often to scan
  daily_candidates_target: 18        # candidates target per day
  min_discussion_volume: 50          # Twitter reply threshold
  min_hn_score: 50                   # HN score threshold
  time_decay_hours: 48               # ignore signals older than this
  cross_source_bonus: 0.3            # boost when same topic hits multiple sources

  # Series weight allocation (affects pushed mix)
  series_weight:
    series_A: 0.25
    series_B: 0.45
    series_C: 0.30
