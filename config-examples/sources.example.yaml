# Sources Configuration Example
#
# Copy to ~/.agentflow/sources.yaml after install. The framework is
# brand-neutral; this example carries no built-in vertical bias. Adjust
# the per-handle ``weight`` field for your own brand BEFORE running
# scheduled scans, otherwise generalist accounts will dominate the
# recall pool.
#
# `weight` semantics (v1.0.22+):
#   high     — always collected
#   medium   — collected unless AGENTFLOW_TWITTER_KOL_ONLY_HIGH=true
#   blocked  — never collected (slot kept for posterity / re-enabling)
#
# Companion env knobs (in your .env):
#   AGENTFLOW_SIGNAL_DOMAIN_THRESHOLD=0.03   # per-signal coverage gate
#   AGENTFLOW_TOPIC_FIT_HARD_THRESHOLD=0.05  # per-cluster Jaccard gate
#   AGENTFLOW_TWITTER_KOL_ONLY_HIGH=false    # restrict to weight: high
#
# Tightly-scoped publishers (crypto-infra, B2B SaaS, regulated finance,
# etc.) typically want to mark generalist AI / startup commentary
# accounts as ``weight: blocked`` outright — see the
# `chainstream-service` overlay for a worked example.

version: "1.0"
last_updated: "2026-05-04"

# ============================================================
# Twitter / X KOL
# ============================================================
# Default everyone to `medium` so the example is genuinely neutral.
# Operators promote a small set to `high` and `blocked` based on
# their own brand vertical. Pre-v1.0.22 example shipped with
# `@paulg` / `@karpathy` / `@simonw` at `weight: high`, which leaked
# OpenAI / startup / vintage-watch tweets into every fresh install
# regardless of the publisher's actual domain. v1.0.24 corrects this
# bias — operators tune weights themselves.
twitter_kols:
  # Web3 / crypto
  - handle: "@balajis"
    weight: medium
    relevance_to_series: ["B", "C"]

  - handle: "@VitalikButerin"
    weight: medium
    relevance_to_series: ["C"]

  - handle: "@dwr_nt"
    weight: medium
    relevance_to_series: ["B", "C"]

  - handle: "@rainandcoffee"
    weight: medium
    relevance_to_series: ["C"]

  - handle: "@jon_charb"
    weight: medium
    relevance_to_series: ["C"]

  # AI / general tech — typically blocked for tightly-scoped
  # publishers. Listed (not deleted) so operators see what they're
  # opting in/out of when they tune the file. Flip to `medium` or
  # `high` if your brand actually covers this beat.
  - handle: "@paulg"
    weight: medium
    relevance_to_series: ["A", "B"]
    note: "VC / startup commentary; blocked by chainstream overlay"

  - handle: "@sama"
    weight: medium
    relevance_to_series: ["B"]
    note: "OpenAI CEO; blocked by chainstream overlay"

  - handle: "@karpathy"
    weight: medium
    relevance_to_series: ["B"]
    note: "AI research; blocked by chainstream overlay"

  - handle: "@simonw"
    weight: medium
    relevance_to_series: ["B"]
    note: "Python / general AI tooling"

  - handle: "@patrickc"
    weight: medium
    relevance_to_series: ["A", "B"]
    note: "Stripe; payments-tangential"

  - handle: "@dhh"
    weight: medium
    relevance_to_series: ["A", "B"]
    note: "Rails / general dev"

# ============================================================
# Twitter / X keyword search (v1.0.26, optional second recall layer)
# ============================================================
# Runs Twitter v2 search_recent_tweets alongside the curated KOL
# timeline pulls above. Useful when your vertical has fast-moving
# topics that a fixed KOL list won't cover (e.g. a new protocol
# launch, a breaking incident, a niche keyword).
#
# Schema (per entry):
#   - query: <Twitter v2 search expression — supports OR / AND / -term>
#     max_results: <10..100, omit to use AGENTFLOW_TWITTER_SEARCH_MAX_RESULTS>
#     weight: high | medium | blocked
#
# `weight` semantics match twitter_kols above: blocked is always
# skipped; AGENTFLOW_TWITTER_KOL_ONLY_HIGH=true restricts to high.
#
# Required envs to enable:
#   AGENTFLOW_TWITTER_SEARCH_ENABLED=true
#   TWITTER_BEARER_TOKEN=<your_v2_bearer_token>
#
# Brand-neutral examples — operator/overlay supplies real queries.
# twitter_search:
#   - query: "<your_topic_keywords>"
#     max_results: 30
#     weight: medium
#   - query: "<another_query> OR <synonym>"
#     max_results: 50
#     weight: high

# ============================================================
# RSS Feeds
# ============================================================
rss_feeds:
