hotspot_question:
  original_question: "Should we turn the AI MCP Server hotspot into a GitHub project?"
  reframed_question: "是否值得围绕 AI MCP Server 热点做一个最小可运行、可编译的 MCP server 仓库来承接关注度与后续内容分发？"
  why_this_should_be_a_repo: "这个热点天然适合用一个可运行仓库而不是纯说明文来体现价值。"
  falsified_if:
    - "热点虽然高，但没有明确开发者需要复用的最小仓库形态。"

