  hotspot_source: "community discussions + new MCP tool launches"
  topic_lineage:
    - "MCP"
    - "AI tooling"
    - "developer workflow"
  related_links:
    - "https://example.com/mcp-launch"

repo_plan:
  local_workspace: ""
